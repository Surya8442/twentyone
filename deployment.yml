apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment

spec:
  replicas: 2
  
  strategy: 
  type: RollingUpdate
  rollingUpdate:
  maxUnavailable: 0
  maxSurge: 1

  selector:
    matchLabels:
      app: myapp

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: myapp
        image: surya8442/myapp:v1
        ports:
        - containerPort: 3000
